name: Update Weather Data

on:
  schedule:
    # GitHub 무료 서버는 트래픽이 많을 때 스케줄을 종종 무시(Drop)합니다. (특히 매시 정각 등)
    # 따라서 1시간에 1번이 아닌 4번(45분, 55분, 05분, 15분) 시도하도록 강력하게 설정합니다.
    # 내용이 똑같으면 git commit이 취소되므로 커밋이 지저분해지지 않습니다.
    - cron: '45,55,05,15 * * * *' 
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  update-weather:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Run Weather Script
      run: python update_weather.py
        
    - name: Commit and Push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add weather_data.json
        git commit -m "Update weather data automatically" || echo "No changes to commit"
        git push
        
    - name: Keepalive Workflow (방치 60일 경과시 자동 중지 방지)
      uses: gautamkrishnar/keepalive-workflow@v2
